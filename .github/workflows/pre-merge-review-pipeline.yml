name: "Pre-Merge Review"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: number

concurrency:
  group: pre-merge-review-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: write
  checks: read
  models: read

jobs:
  pre-merge-review:
    name: Read-only PR Review
    if: >-
      (github.event_name == 'pull_request_target' &&
        github.event.pull_request.draft == false &&
        !startsWith(github.event.pull_request.head.ref, 'copilot/')) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/pre-merge-review')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout trusted workflow code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Run pre-merge review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
          WAIT_FOR_STAGE1: ${{ github.event_name == 'pull_request_target' && 'true' || 'false' }}
          PRE_MERGE_REVIEW_MODEL: ${{ vars.PRE_MERGE_REVIEW_MODEL || 'openai/gpt-4.1' }}
        run: node .github/scripts/pre-merge-review.mjs